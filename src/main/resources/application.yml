server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: softbridge-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/SOFTBRIDGE?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your_email@gmail.com}
    password: ${MAIL_PASSWORD:your_app_password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

jwt:
  secret: ${JWT_SECRET:5A7134743777217A25432A462D4A614E645267556B58703272357538782F413F}
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000

app:
  admin:
    email: admin@softbridge.com
    password: Admin123
    firstName: Admin
    lastName: User

  cors:
    allowed-origins:
      - ${FRONTEND_URL:http://localhost:3000}
      - http://localhost:3000
      - http://127.0.0.1:3000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

logging:
  level:
    com.softbridge: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
